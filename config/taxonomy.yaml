schema_version: 1

# areas 和 topics 的声明顺序决定目录展示顺序；不要按键名字母排序。
# 一级领域决定物理目录。它应当稳定、互斥，并描述论文的主要研究对象。
areas:
  foundations:
    label_zh: 基础与综述
    description: 数据库领域基础知识、总览和跨领域综述。
  system-architecture:
    label_zh: 系统架构
    description: 完整数据库系统、云数据库、系统组件协同与工程架构。
  query-processing:
    label_zh: 查询处理
    description: 查询优化、执行、编译、向量化和运行时自适应。
  storage:
    label_zh: 存储
    description: 存储引擎、数据布局、文件系统、索引和介质感知设计。
  transactions:
    label_zh: 事务与并发控制
    description: 事务、并发控制、恢复、一致性和隔离级别。
  distributed-databases:
    label_zh: 分布式数据库
    description: 复制、分片、共识、地理分布和分布式事务。
  data-integration:
    label_zh: 数据集成
    description: 数据导入、ETL、连接器、格式解析和数据交换。
  streaming:
    label_zh: 流处理
    description: 流式计算、增量计算、事件时间和流批一体。
  reliability-and-testing:
    label_zh: 可靠性与测试
    description: 数据库测试、验证、可观测性、故障注入和质量保障。
  specialized-databases:
    label_zh: 专用数据库
    description: 图、时序、向量、空间、科学数据等专用数据系统。
  ai-and-data:
    label_zh: AI 与数据系统
    description: AI 与数据管理的交叉系统、语言模型数据交互与 AI 工作负载。

# topics 是可多选的受控词表。新增词前先修改本文件，避免同义标签漂移。
topics:
  database-overview:
    label_zh: 数据库总览
    description: 跨数据库子领域介绍核心概念、研究版图或系统原理。
  database-system-design:
    label_zh: 数据库系统设计
    description: 讨论完整数据库系统或多个核心组件的整体设计与协同。
  cloud-native:
    label_zh: 云原生
    description: 面向云环境的弹性、解耦、无服务器化或托管系统设计。
  query-optimization:
    label_zh: 查询优化
    description: 选择、搜索或改写查询计划及其代价与规则体系。
  query-execution:
    label_zh: 查询执行
    description: 查询算子、流水线、调度和运行时执行机制。
  query-compilation:
    label_zh: 查询编译
    description: 将查询或算子生成、特化或编译为可执行代码。
  vectorized-execution:
    label_zh: 向量化执行
    description: 以批量数据和向量化算子提升查询执行效率。
  storage-engine:
    label_zh: 存储引擎
    description: 数据组织、读写路径、压缩、缓存或介质管理机制。
  data-loading:
    label_zh: 数据导入
    description: 数据摄取、解析、转换和高效装载过程。
  database-testing:
    label_zh: 数据库测试
    description: 数据库正确性测试、缺陷检测、验证或测试数据生成。
  analytical-database:
    label_zh: 分析型数据库
    description: 面向 OLAP、交互分析或数据仓库负载的系统与机制。
  data-federation:
    label_zh: 数据联邦
    description: 跨异构数据源统一查询、规划和执行。
  distributed-sql:
    label_zh: 分布式 SQL
    description: 提供 SQL 语义的分布式查询与事务系统。
  distributed-storage:
    label_zh: 分布式存储
    description: 跨节点保存、复制、分片和管理数据的存储系统。
  file-system:
    label_zh: 文件系统
    description: 面向数据库或数据平台的文件系统架构与实现。
  stream-processing:
    label_zh: 流处理
    description: 持续数据流、事件时间、增量计算或流批统一处理。
  transaction-processing:
    label_zh: 事务处理
    description: 事务执行、提交、恢复和端到端处理机制。
  relational-model:
    label_zh: 关系模型
    description: 关系数据模型、关系语言及其理论基础。
  indexing:
    label_zh: 索引
    description: 用于定位、过滤或近邻检索的数据结构和访问路径。
  concurrency-control:
    label_zh: 并发控制
    description: 隔离、锁、时间戳、乐观控制或并发正确性机制。
  cardinality-estimation:
    label_zh: 基数估计
    description: 估计查询中间结果规模、选择率或数据分布。
  ai-for-databases:
    label_zh: AI 优化数据库
    description: 使用机器学习或 AI 改进数据库设计、优化与运维。
  databases-for-ai:
    label_zh: 面向 AI 的数据系统
    description: 为模型训练、推理、检索或 AI 数据工作负载提供系统支持。
  language-models-for-data:
    label_zh: 语言模型与数据
    description: 使用语言模型理解、访问、转换或管理结构化与非结构化数据。
  vector-search:
    label_zh: 向量检索
    description: 向量相似性搜索、近似近邻索引及其系统集成。
  lakehouse:
    label_zh: 湖仓一体
    description: 在开放数据湖上统一数据仓库能力、事务与分析。
